services:
  jenkins:
    build:
      context: ./infra/jenkins-local
    container_name: finanzas-claras-jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: -Djenkins.install.runSetupWizard=true
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/workspace/FinanzasClaras

volumes:
  jenkins_home:
